<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息管理 - 管理员后台</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/bootstrap-icons.css">
    <style>
.text-muted { color: #aaa !important; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .navbar { background: rgba(0,0,0,0.4) !important; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: rgba(0,0,0,0.2);
        }
        .sidebar a {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            border-radius: 8px;
            margin: 4px 8px;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.15);
        }
    </style>
    <link rel="stylesheet" href="/static/css/labsafe-admin.css">
</head>
<body style="color: #fff;">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin">
                <i class="bi bi-shield-check"></i> 消息管理 - 管理员后台
            </a>
            <a href="/admin" class="btn btn-outline-light btn-sm">返回后台</a>
        </div>
    </nav>
    
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-3">
                <a href="/admin"><i class="bi bi-speedometer2 me-2"></i>总览</a>
                <a href="/admin/cameras"><i class="bi bi-camera-video me-2"></i>视频监控</a>
                <a href="/admin/messages" class="active"><i class="bi bi-chat-dots me-2"></i>消息管理</a>
                <a href="/admin/send"><i class="bi bi-send me-2"></i>发送通知</a>
            </nav>
            
            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <h2 class="mb-4"><i class="bi bi-chat-dots me-2"></i>消息管理</h2>
                
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <h5 class="mb-0">所有消息</h5>
                        <button class="btn btn-sm btn-outline-light" onclick="clearMessages()">清空</button>
                    </div>
                    <div class="card-body p-0" style="max-height: 70vh; overflow-y: auto;">
                        <div id="messageList">
                            <div class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1"></i>
                                <p class="mb-0">等待消息...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
        let ws = null;
        let messageCount = 0;
        
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.hostname}:8765`);
            
            ws.onopen = function() {
                addMessage('系统', '已连接', 'system');
            };
            
            ws.onclose = function() {
                addMessage('系统', '连接断开', 'warning');
                setTimeout(connect, 3000);
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch(e) {}
            };
        }
        
        function handleMessage(data) {
            const type = data.type || 'normal';
            const level = data.level || 'normal';
            const title = data.title || '';
            const content = data.content || '';
            const sender = data.sender || '未知';
            const time = data.timestamp || new Date().toISOString();
            
            messageCount++;
            addMessage(sender, title + ' ' + content, level);
        }
        
        function addMessage(sender, content, level) {
            const time = new Date().toLocaleTimeString();
            const colors = {danger:'#f44336', warning:'#ff9800', system:'#2196F3', normal:'#fff'};
            
            const item = document.createElement('div');
            item.className = 'msg-item';
            item.style.cssText = 'padding:12px 15px;border-bottom:1px solid rgba(255,255,255,0.1);color:' + (colors[level] || '#fff');
            item.innerHTML = `<strong>${sender}</strong> <span style="color:#aaa;float:right">${time}</span><br><span style="color:#fff">${content}</span>`;
            
            const list = document.getElementById('messageList');
            if (list.querySelector('.text-muted')) list.innerHTML = '';
            list.insertBefore(item, list.firstChild);
        }
        
        // 加载历史消息
        function loadHistory() {
            fetch('/api/messages')
                .then(r => r.json())
                .then(messages => {
                    messages.forEach(msg => {
                        addSystemMessage(`[${msg.time}] ${msg.sender}: ${msg.content}`);
                    });
                });
        }
        
        function addSystemMessage(content) {
            const item = document.createElement('div');
            item.className = 'msg-item';
            item.style.cssText = 'padding:12px 15px;border-bottom:1px solid rgba(255,255,255,0.1);color:#fff';
            item.innerHTML = `<small class="text-info">${content}</small>`;
            
            const list = document.getElementById('messageList');
            if (list.querySelector('.text-muted')) list.innerHTML = '';
            list.insertBefore(item, list.firstChild);
        }
        
        function clearMessages() {
            document.getElementById('messageList').innerHTML = '<div class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1"></i><p class="mb-0">等待消息...</p></div>';
        }
        
        loadHistory();
        connect();
    </script>
    {% include 'agent_widget.html' %}
</body>
</html>
