<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验室安全管理 - 管理员后台</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/bootstrap-icons.css">
    <style>
.text-muted { color: #aaa !important; }
        :root {
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --success-color: #198754;
            --info-color: #0dcaf0;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .navbar {
            background: rgba(0, 0, 0, 0.4) !important;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: rgba(0, 0, 0, 0.2);
        }
        .sidebar a {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            border-radius: 8px;
            margin: 4px 8px;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255, 255, 255, 0.15);
        }
        .alert-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .alert-normal { background: rgba(25, 135, 84, 0.3); border: 1px solid var(--success-color); }
        .alert-warning { background: rgba(255, 193, 7, 0.3); border: 1px solid var(--warning-color); color: #fff; }
        .alert-danger { background: rgba(220, 53, 69, 0.3); border: 1px solid var(--danger-color); animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .msg-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }
        .msg-item:hover { background: rgba(255,255,255,0.05); }
        .msg-item:last-child { border-bottom: none; }
        .msg-time { color: #ccc; font-size: 0.85em; }
        .msg-new { border-left: 3px solid var(--info-color); }
        
        .camera-frame {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }
        .camera-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-emergency {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-emergency:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(255,0,0,0.4); }
        
        .connection-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-connected { background: var(--success-color); }
        .status-disconnected { background: var(--danger-color); }
    </style>
    <link rel="stylesheet" href="/static/css/labsafe-admin.css">
</head>
<body style="color: #fff;">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin">
                <i class="bi bi-shield-check"></i> LabSafe 管理员后台
            </a>
            <span class="navbar-text">
                <span id="connStatus" class="connection-status status-disconnected"></span>
                <span id="connText">未连接</span>
            </span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-2 d-none d-md-block sidebar py-3">
                <a href="/admin" class="active"><i class="bi bi-speedometer2 me-2"></i>总览</a>
                <a href="/admin/cameras"><i class="bi bi-camera-video me-2"></i>视频监控</a>
                <a href="/admin/messages"><i class="bi bi-chat-dots me-2"></i>消息管理</a>
                <a href="/admin/send"><i class="bi bi-send me-2"></i>发送通知</a>
                <a href="/admin/settings"><i class="bi bi-gear me-2"></i>系统设置</a>
                <hr>
                <a href="/" target="_blank"><i class="bi bi-box-arrow-right me-2"></i>返回用户端</a>
            </nav>

            <!-- 主内容 -->
            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <!-- 状态概览 -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card p-3 text-center">
                            <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
                            <div class="fs-2 fw-bold" id="alertCount">0</div>
                            <div>待处理报警</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 text-center">
                            <i class="bi bi-people text-info fs-1"></i>
                            <div class="fs-2 fw-bold" id="deviceCount">0</div>
                            <div>在线设备</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 text-center">
                            <i class="bi bi-camera-video text-success fs-1"></i>
                            <div class="fs-2 fw-bold">2</div>
                            <div>在线摄像头</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 text-center">
                            <i class="bi bi-thermometer-half text-warning fs-1"></i>
                            <div class="fs-2 fw-bold" id="temperature">25°C</div>
                            <div>环境温度</div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <!-- 实时消息 -->
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0"><i class="bi bi-chat-square-text me-2"></i>实时消息</h5>
                                <button class="btn btn-sm btn-outline-light" onclick="clearMessages()">清空</button>
                            </div>
                            <div class="card-body p-0" style="max-height: 400px; overflow-y: auto;">
                                <div id="messageList">
                                    <div class="text-center py-5 text-muted">
                                        <i class="bi bi-inbox fs-1"></i>
                                        <p class="mb-0">等待消息...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 快速操作 -->
                    <div class="col-md-4">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0"><i class="bi bi-lightning me-2"></i>快速操作</h5>
                            </div>
                            <div class="card-body">
                                <div class="d-grid gap-2">
                                    <button class="btn btn-danger" onclick="sendAlert('火灾报警', '发生火灾，请立即处理！')">
                                        <i class="bi bi-fire me-2"></i>发送火灾报警
                                    </button>
                                    <button class="btn btn-warning" onclick="sendAlert('系统维护', '系统将进行维护，请做好准备。')">
                                        <i class="bi bi-tools me-2"></i>发送维护通知
                                    </button>
                                    <button class="btn btn-info" onclick="sendAlert('安全提示', '请注意实验室安全规范。')">
                                        <i class="bi bi-info-circle me-2"></i>发送安全提示
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0"><i class="bi bi-send me-2"></i>发送通知</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <input type="text" class="form-control" id="notifyTitle" placeholder="通知标题">
                                </div>
                                <div class="mb-3">
                                    <textarea class="form-control" id="notifyContent" rows="3" placeholder="通知内容"></textarea>
                                </div>
                                <div class="d-grid">
                                    <button class="btn btn-primary" onclick="sendNotification()">
                                        <i class="bi bi-send me-2"></i>发送
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
        // WebSocket连接
        let ws = null;
        let messageCount = 0;
        
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.hostname}:8765`);
            
            ws.onopen = function() {
                document.getElementById('connStatus').className = 'connection-status status-connected';
                document.getElementById('connText').textContent = '已连接';
                addSystemMessage('已连接到消息服务器');
            };
            
            ws.onclose = function() {
                document.getElementById('connStatus').className = 'connection-status status-disconnected';
                document.getElementById('connText').textContent = '未连接';
                addSystemMessage('连接断开，3秒后重连...');
                setTimeout(connect, 3000);
            };
            
            ws.onmessage = function(event) {
                console.log('Received:', event.data);
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch(e) {
                    console.error('消息解析失败', e);
                }
            };
        }
        
        function handleMessage(data) {
            const type = data.type || 'normal';
            const level = data.level || 'normal';
            const title = data.title || '';
            const content = data.content || '';
            const sender = data.sender || '未知';
            const time = data.timestamp || new Date().toISOString();
            
            // 保存消息到历史记录
            const fullContent = title + ' ' + content;
            if (fullContent.trim()) {
                fetch('/api/messages/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        sender: sender,
                        content: fullContent.trim(),
                        type: type
                    })
                }).catch(e => console.error('保存消息失败', e));
            }
            
            // 添加消息
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg-item msg-new';
            
            let icon = '';
            if (type === 'emergency' || type === 'alert') {
                icon = '🔴';
                messageCount++;
                document.getElementById('alertCount').textContent = messageCount;
                // 闪烁提醒
                document.title = '⚠️ 新报警！';
                
                // 弹窗提醒
                alert(`🚨 紧急报警！\n\n来自: ${sender}\n内容: ${title} ${content}`);
            } else if (type === 'status') {
                icon = '🔵';
                if (title.includes('温度')) {
                    const temp = content.match(/\d+/);
                    if (temp) document.getElementById('temperature').textContent = temp[0] + '°C';
                }
            } else {
                icon = '⚪';
            }
            
            msgDiv.innerHTML = `
                <div class="d-flex justify-content-between">
                    <strong>${icon} ${sender}</strong>
                    <span class="msg-time">${new Date(time).toLocaleTimeString()}</span>
                </div>
                <div>${title} ${content}</div>
            `;
            
            const list = document.getElementById('messageList');
            if (list.querySelector('.text-muted')) {
                list.innerHTML = '';
            }
            list.insertBefore(msgDiv, list.firstChild);
            
            // 限制消息数
            while (list.children.length > 50) {
                list.removeChild(list.lastChild);
            }
        }
        
        function addSystemMessage(content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg-item';
            msgDiv.innerHTML = `<small class="text-info">${content}</small>`;
            const list = document.getElementById('messageList');
            list.insertBefore(msgDiv, list.firstChild);
        }
        
        function sendMessage(msg) {
            console.log('Sending:', msg);
            
            // 保存消息到历史记录
            const fullContent = (msg.title || '') + ' ' + (msg.content || '');
            if (fullContent.trim()) {
                fetch('/api/messages/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        sender: msg.sender || 'admin',
                        content: fullContent.trim(),
                        type: msg.type || 'chat'
                    })
                }).catch(e => console.error('保存消息失败', e));
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(msg));
                return true;
            }
            console.log('WS not ready, but message saved:', ws ? ws.readyState : 'null');
            return true;  // 返回true表示发送成功（即使WebSocket未连接）
        }
        
        function sendAlert(title, content) {
            const msg = {
                type: 'normal',
                level: title.includes('火灾') ? 'danger' : 'warning',
                title: title,
                content: content,
                sender: 'admin'
            };
            
            if (sendMessage(msg)) {
                addSystemMessage(`已发送: ${title}`);
            } else {
                alert('发送失败，请检查连接');
            }
        }
        
        function sendNotification() {
            const title = document.getElementById('notifyTitle').value || '通知';
            const content = document.getElementById('notifyContent').value;
            
            if (!content) {
                alert('请输入内容');
                return;
            }
            
            const msg = {
                type: 'normal',
                level: 'normal',
                title: title,
                content: content,
                sender: 'admin'
            };
            
            if (sendMessage(msg)) {
                document.getElementById('notifyTitle').value = '';
                document.getElementById('notifyContent').value = '';
                addSystemMessage(`已发送: ${title}`);
            } else {
                alert('发送失败，请检查连接');
            }
        }
        
        function clearMessages() {
            // 清空前端显示
            document.getElementById('messageList').innerHTML = `
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-inbox fs-1"></i>
                    <p class="mb-0">等待消息...</p>
                </div>
            `;
            messageCount = 0;
            document.getElementById('alertCount').textContent = '0';
            
            // 清空后端历史记录
            fetch('/api/messages/clear', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        console.log('历史消息已清空');
                    }
                })
                .catch(e => console.error('清空失败', e));
        }
        
        // 初始化
        connect();
        
        // 页面加载完成后加载历史消息
        function loadHistoryMessages() {
            console.log('加载历史消息...');
            fetch('/api/messages')
                .then(r => r.json())
                .then(messages => {
                    console.log('收到消息:', messages);
                    messages.forEach(msg => {
                        addSystemMessage(`[${msg.time}] ${msg.sender}: ${msg.content}`);
                    });
                })
                .catch(e => console.error('加载历史消息失败', e));
        }
        
        // 页面加载完成后加载历史消息
        window.addEventListener('DOMContentLoaded', loadHistoryMessages);
        window.addEventListener('load', loadHistoryMessages);
        
        // 定时刷新
        setInterval(() => {
            document.getElementById('deviceCount').textContent = 
                document.querySelectorAll('.msg-item').length > 0 ? 
                Math.floor(Math.random() * 3) + 1 : 0;
        }, 5000);
    </script>
    {% include 'agent_widget.html' %}
</body>
</html>
